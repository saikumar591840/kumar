version: '3.8'

services:
  app:
    build: .
    ports:
      - '5000:5000'
    environment:
      MONGO_URI: mongodb://mongo:27017/taskmanager
      JWT_SECRET: your_jwt_secret_here
      NODE_ENV: production
    depends_on:
      - mongo

  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
